services:
  - type: web
    name: trusthome
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run expo:static:build && npm run server:build
    startCommand: node server_dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: SITE_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ORBIT_HUB_URL
        sync: false
      - key: ORBIT_ECOSYSTEM_API_KEY
        sync: false
      - key: ORBIT_ECOSYSTEM_API_SECRET
        sync: false
      - key: DARKWAVE_API_KEY
        sync: false
      - key: DARKWAVE_API_SECRET
        sync: false
      - key: TRUSTLAYER_API_KEY
        sync: false
      - key: TRUSTLAYER_API_SECRET
        sync: false
      - key: TRUSTLAYER_BASE_URL
        sync: false
      - key: TRUSTHOME_TENANT_ID
        sync: false
      - key: TZ
        value: "America/Chicago"
